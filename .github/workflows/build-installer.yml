name: Build Windows installer

# Build l'installeur NSIS dans le cloud Windows de GitHub (pas de Smart App Control, donc
# l'étape de génération du désinstalleur — qui exécute l'installeur fraîchement compilé — passe
# sans être bloquée, contrairement à un build local sur une machine avec SAC actif).
#
# L'installeur est publié comme "artifact" téléchargeable : on le récupère ensuite localement
# (gh run download) et on l'attache à la release du dépôt public. Ce découplage évite de stocker
# un jeton d'accès au dépôt public dans ce dépôt privé.

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build installer (NSIS)
        # --publish never : en CI, electron-builder tente sinon de publier tout seul vers GitHub
        # (et réclame un GH_TOKEN). On ne veut que produire l'installeur, la publication est faite
        # à part. On appelle donc les étapes de `dist` à la main pour ajouter ce flag.
        run: |
          npm run icon
          npm run fetch-node
          npx electron-builder --win nsis --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: PalLauncherServerManager-Setup
          path: dist/PalLauncherServerManager-Setup.exe
          if-no-files-found: error
