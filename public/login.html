<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion — Pal Launcher Server Manager</title>
<link rel="icon" type="image/png" href="/logo.png">
<link rel="stylesheet" href="/style.css">
<script src="/i18n.js" defer></script>
</head>
<body class="login-body">
  <form id="loginForm" class="login-card">
    <h1><img src="/logo.png" alt="" class="brand-logo"> Pal Launcher Server Manager</h1>
    <input type="text" id="username" placeholder="Nom d'utilisateur" autocomplete="username" required>
    <input type="password" id="password" placeholder="Mot de passe" autocomplete="current-password" required>
    <button type="submit">Se connecter</button>
    <p id="error" class="error"></p>
  </form>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      if (res.ok) {
        window.location.href = '/';
      } else {
        const data = await res.json().catch(() => ({}));
        document.getElementById('error').textContent =
          data.error === 'too_many_attempts'
            ? 'Trop de tentatives, réessaie dans quelques minutes.'
            : 'Identifiants incorrects.';
      }
    });
  </script>
</body>
</html>
